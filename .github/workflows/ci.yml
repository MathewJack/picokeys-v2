name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-host:
    name: Check (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Check picokeys-cli (host target)
        run: cargo check -p picokeys-cli

  check-embedded:
    name: Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: thumbv6m-none-eabi
            features: rp2040
          - target: thumbv8m.main-none-eabihf
            features: rp2350
          - target: riscv32imac-unknown-none-elf
            features: esp32c6
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Check pico-rs-sdk
        run: cargo check -p pico-rs-sdk --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
      - name: Check pico-rs-fido
        run: cargo check -p pico-rs-fido --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (picokeys-cli)
        run: cargo clippy -p picokeys-cli -- -D warnings

  test:
    name: Tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run host-side unit tests
        run: cargo test -p picokeys-cli --lib
      - name: Run pico-rs-fido tests (host features)
        run: |
          if cargo metadata --no-deps --format-version 1 -p pico-rs-fido 2>/dev/null | grep -q '"host-test"'; then
            cargo test -p pico-rs-fido --lib --features host-test
          else
            echo "host-test feature not yet configured — skipping"
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  release-cli:
    name: Release CLI (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: picokeys-cli
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: picokeys-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: picokeys-cli.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build -p picokeys-cli --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picokeys-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
